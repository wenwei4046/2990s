name = "2990s-api"
main = "src/index.ts"
compatibility_date = "2026-05-08"
compatibility_flags = ["nodejs_compat"]

# Custom domain for the Worker. `wrangler deploy` attaches api.2990shome.com to
# this Worker on each deploy. REQUIRES the 2990shome.com zone to be active on the
# same Cloudflare account first (DNS managed by Cloudflare) — otherwise the
# deploy fails provisioning the domain. The old *.workers.dev URL keeps working.
[[routes]]
pattern = "api.2990shome.com"
custom_domain = true

# Public env (non-secrets). Secrets set via `wrangler secret put`:
#   wrangler secret put SUPABASE_ANON_KEY
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#   wrangler secret put R2_ACCESS_KEY_ID
#   wrangler secret put R2_SECRET_ACCESS_KEY
#   wrangler secret put ANTHROPIC_API_KEY     <- Scan Order OCR (routes/scan-so.ts);
#                                                optional - endpoint 503s until set.
[vars]
SUPABASE_URL = "https://dolvxrchzbnqvahocwsu.supabase.co"

# PR #48 — invite + recovery magic links anchor here. Must match the
# production Backend portal URL and be on the Supabase Redirect URLs
# allow-list (Authentication → URL Configuration).
#
# 2026-05-27 (role-based redirect) — POS-only roles (sales,
# sales_executive, outlet_manager) get their magic link anchored to
# POS_PORTAL_URL instead so they land in the POS app on first sign-in.
# Both URLs must be on the Supabase Redirect URLs allow-list.
BACKEND_PORTAL_URL = "https://erp.2990shome.com"
POS_PORTAL_URL = "https://pos.2990shome.com"

# Allowed CORS origins (dev + prod). Custom domains erp/pos.2990shome.com are the
# primary prod origins; the legacy *.pages.dev URLs are kept so anyone hitting
# the old address mid-cutover still works. Both must also be on the Supabase
# Redirect URLs allow-list for magic links (Authentication → URL Configuration).
ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:6273,http://localhost:6274,http://localhost:6275,http://localhost:6276,http://127.0.0.1:5174,http://127.0.0.1:6273,http://127.0.0.1:6274,http://127.0.0.1:6275,http://127.0.0.1:6276,https://pos.2990shome.com,https://erp.2990shome.com,https://2990s-pos.pages.dev,https://2990s-backend.pages.dev"

# R2 bucket settings — fill R2_ENDPOINT after CF account ID is known
# (CF dashboard → top-right account dropdown → Account ID).
R2_BUCKET_NAME = "2990s-slips"
R2_ENDPOINT = "https://e2494242a0fd563cacee5a301cf95dd3.r2.cloudflarestorage.com"

# Task #92 — SO item photos bucket name used for S3 SigV4 presigning.
# Distinct from R2_BUCKET_NAME (which is slips). The Worker binding is
# named SO_ITEM_PHOTOS (below) and shares the same R2_ENDPOINT +
# R2_ACCESS_KEY_ID/SECRET credentials (account-scoped R2 token).
SO_ITEM_PHOTOS_BUCKET_NAME = "2990s-so-item-photos"

# R2 binding for slip storage (Slip MVP).
[[r2_buckets]]
binding = "SLIPS"
bucket_name = "2990s-slips"

# R2 binding for per-line SO item photos (Task #79 — PR-F).
# Commander must create the bucket `2990s-so-item-photos` (production)
# + `2990s-so-item-photos-preview` (wrangler dev preview) in the
# Cloudflare dashboard before `wrangler deploy`. Bucket stays PRIVATE —
# images are served via the proxy endpoint
#   GET /mfg-sales-orders/:docNo/items/:itemId/photos/:photoKey
# so the bucket does not need public access. Custom public domain
# (e.g. r2.2990s.com) can be wired later; until then the proxy is the
# only entry point.
[[r2_buckets]]
binding = "SO_ITEM_PHOTOS"
bucket_name = "2990s-so-item-photos"
preview_bucket_name = "2990s-so-item-photos-preview"

# R2 binding for public assets (Task 18 — category hero photos).
# TODO(Task 18): create the 2990s-public bucket in the Cloudflare dashboard,
# enable public access (.r2.dev or custom domain), then set VITE_R2_PUBLIC_URL
# in apps/backend/.env and apps/pos/.env to the public URL. Until provisioned,
# `wrangler deploy` will fail because the bucket doesn't exist — so this
# binding is intentionally COMMENTED OUT. The env.ts type is declared
# regardless so the TS compiler is happy; the runtime check on env.PUBLIC_ASSETS
# in routes/categories.ts will simply throw when the binding is missing, which
# matches the "endpoint errors until R2 is provisioned" plan. Uncomment the
# four lines below once the bucket exists.
# [[r2_buckets]]
# binding = "PUBLIC_ASSETS"
# bucket_name = "2990s-public"
# preview_bucket_name = "2990s-public"

# Cron triggers:
#   "*/10 * * * *" — slip-orphan reaper (every 10 min)
#   "0 20 * * SUN" — weekly scan-SO salesperson-rule distill
#                    (Sun 20:00 UTC = Mon 04:00 MYT; must match
#                    WEEKLY_DISTILL_CRON in src/index.ts).
#                    Day-of-week MUST be a name or 1-7 — Cloudflare rejects
#                    "* * 0" with "invalid cron string" and the whole
#                    `wrangler deploy` fails (hit 2026-06-12).
[triggers]
crons = ["*/10 * * * *", "0 20 * * SUN"]
