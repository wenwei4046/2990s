<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">
  <title>2990s Sofa Module — 2A-LHF — 2 Seater, Left Hand Facing</title>
  <desc>Top-down plan view. 2 seats with backrest at top + a hard armrest on the LEFT side; dashed seam between the two seats.</desc>
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="120" height="70" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <rect x="0" y="0" width="120" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- LEFT armrest (darkest tan) -->
    <rect x="0" y="0" width="11" height="70" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- Seat-to-seat dashed divider -->
    <line x1="65.5" y1="0" x2="65.5" y2="70" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>
</svg>
