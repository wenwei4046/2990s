<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 145" width="100" height="145">
  <title>2990s Sofa Module — L-RHF — L-Shape Chaise, Right Hand Facing</title>
