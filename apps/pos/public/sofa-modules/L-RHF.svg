  <g transform="translate(20,20)">
    <rect x="0" y="0" width="60" height="105" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <rect x="0" y="0" width="60" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- RIGHT armrest (darkest tan) -->
    <rect x="49" y="0" width="11" height="105" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
  </g>
