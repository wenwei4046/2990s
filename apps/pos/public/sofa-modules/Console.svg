<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" width="100" height="200">
  <title>2990s Sofa Module — Console — Fabric-wrapped console with cup holders</title>
  <desc>Tall narrow console FULLY UPHOLSTERED in fabric (no wood lid). Same darkest tan throughout body + lid area, with vertical seams, mid-seam, and 2 cup holders near the base. Distinguishes from Console/WC which has the contrasting wood lid.</desc>
  <g transform="translate(20,20)">
    <!-- Fabric-wrapped body (single color, no wood lid contrast) -->
    <rect x="0" y="0" width="60" height="160" rx="6" fill="#B89972" stroke="#2C2C2A" stroke-width="1.4"/>
    <!-- Top cushion seam (where the lid section meets the body, but same fabric — softer seam) -->
    <line x1="2" y1="20" x2="58" y2="20" stroke="#2C2C2A" stroke-width="0.6"/>
    <!-- Vertical seam lines on body -->
    <line x1="20" y1="22" x2="20" y2="156" stroke="#2C2C2A" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="40" y1="22" x2="40" y2="156" stroke="#2C2C2A" stroke-width="0.4" stroke-dasharray="2,2"/>
    <!-- Horizontal mid-seam -->
    <line x1="4" y1="80" x2="56" y2="80" stroke="#2C2C2A" stroke-width="0.5"/>
    <!-- Cup holders near the base — two circles -->
    <circle cx="20" cy="140" r="5" fill="#8C7956" stroke="#2C2C2A" stroke-width="0.8"/>
    <circle cx="40" cy="140" r="5" fill="#8C7956" stroke="#2C2C2A" stroke-width="0.8"/>
  </g>
</svg>
