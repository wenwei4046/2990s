<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 148 110" width="148" height="110">
  <title>2990s Sofa Module — 2NA — 2 Seater, No Arms</title>
  <desc>Top-down plan view. 2 seats with backrest at top, NO armrests; dashed seam between the two seats.</desc>
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="108" height="70" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <rect x="0" y="0" width="108" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- Seat-to-seat dashed divider -->
    <line x1="54" y1="0" x2="54" y2="70" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>
</svg>
