<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#221F20" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="2990 POS" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>2990's POS</title>
  </head>
  <body data-theme="cream" data-density="calm">
    <div id="root"></div>
    <!-- Deploy-window boot watchdog (Owner 2026-07-16) — mirrors the Backend.
         If the ENTRY module graph fails right after a deploy (CF Pages serves
         the SPA HTML for a missing hashed chunk), no app JS runs and the tab
         stays blank with no error. If #root is still empty ~8s after load,
         reload (at most once a minute per tab) until the new build comes up. -->
    <script>
      (function () {
        var KEY = '__bootRetryAt';
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (!root || root.childElementCount > 0 || navigator.onLine === false) return;
            var last = Number(sessionStorage.getItem(KEY) || 0);
            if (Date.now() - last > 60000) {
              sessionStorage.setItem(KEY, String(Date.now()));
              location.reload();
            }
          }, 8000);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
