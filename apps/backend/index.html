<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#221F20" />
    <!-- Same brand mark as the POS tab (apps/pos/public) — one icon family
         across both portals (Loo 2026-06-12). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>2990's — Backend</title>
  </head>
  <body data-theme="cream" data-density="calm">
    <div id="root"></div>
    <!-- Deploy-window boot watchdog (Owner 2026-07-16). If the ENTRY module
         graph fails (CF Pages briefly serves the SPA HTML for a missing hashed
         chunk right after a deploy), no app JS ever runs — the tab stays blank
         forever with no console error and the in-app vite:preloadError rescue
         can't fire. Inline + framework-free on purpose: if #root is still
         empty ~8s after load, reload (at most once a minute per tab) until the
         new build comes up. A healthy boot renders long before 8s, so this is
         inert in normal use. -->
    <script>
      (function () {
        var KEY = '__bootRetryAt';
        window.addEventListener('load', function () {
          setTimeout(function () {
            var root = document.getElementById('root');
            if (!root || root.childElementCount > 0 || navigator.onLine === false) return;
            var last = Number(sessionStorage.getItem(KEY) || 0);
            if (Date.now() - last > 60000) {
              sessionStorage.setItem(KEY, String(Date.now()));
              location.reload();
            }
          }, 8000);
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
