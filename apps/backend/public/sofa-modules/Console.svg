<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" width="100" height="200">
  <title>2990s Sofa Module — Console — Wood lid + fabric-wrapped body + cup holders</title>
  <desc>Tall narrow upholstered console that slots between two sofa modules. Wood lid on top (lighter tan, rounded), upholstered fabric body with vertical seam lines, and two cup-holder circles near the base.</desc>
  <g transform="translate(20,20)">
    <!-- Upholstered body (fabric) -->
    <rect x="0" y="20" width="60" height="140" rx="3" fill="#B89972" stroke="#2C2C2A" stroke-width="1.4"/>
    <!-- Wood lid on top (lighter tan, rounded — the cover) -->
    <rect x="-2" y="0" width="64" height="22" rx="5" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="1.4"/>
    <!-- Vertical seam lines on upholstered body -->
    <line x1="20" y1="24" x2="20" y2="156" stroke="#2C2C2A" stroke-width="0.4" stroke-dasharray="2,2"/>
    <line x1="40" y1="24" x2="40" y2="156" stroke="#2C2C2A" stroke-width="0.4" stroke-dasharray="2,2"/>
    <!-- Horizontal mid-seam (where strap/handle would be) -->
    <line x1="4" y1="80" x2="56" y2="80" stroke="#2C2C2A" stroke-width="0.5"/>
    <!-- Cup holders near the base — two circles -->
    <circle cx="20" cy="140" r="5" fill="#8C7956" stroke="#2C2C2A" stroke-width="0.8"/>
    <circle cx="40" cy="140" r="5" fill="#8C7956" stroke="#2C2C2A" stroke-width="0.8"/>
  </g>
</svg>
