<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">
  <title>2990s Sofa Module — 1B-RHF — Bench (chaise) on RIGHT, regular arm on LEFT</title>
  <desc>Top-down plan view. Mirror of 1B-LHF. RIGHT side: wide soft bench/chaise cushion (full body height, no backrest above). LEFT side: regular tall narrow hard armrest.</desc>
  <g transform="translate(20,20)">
    <!-- Body outline (cream) -->
    <rect x="0" y="0" width="60" height="70" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <!-- Backrest covers ONLY the seat (left) portion -->
    <rect x="0" y="0" width="38" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- RIGHT bench/chaise cushion — wide soft pillow, full body height -->
    <rect x="38" y="2" width="20" height="66" rx="5" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- LEFT armrest — tall narrow dark tan -->
    <rect x="0" y="0" width="12" height="70" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
  </g>
</svg>
