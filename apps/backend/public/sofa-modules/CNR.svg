<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>2990s Sofa Module — CNR — Corner Piece (90° L-shape connector)</title>
  <desc>Top-down plan view. Square seat with backrest on TWO adjacent sides (top + left, forming an L). The other two sides (right + bottom) are open edges for connecting to perpendicular sofa segments.</desc>
  <g transform="translate(20,20)">
    <!-- Square body 60×60 (seat cushion) -->
    <rect x="0" y="0" width="60" height="60" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <!-- TOP backrest strip -->
    <rect x="0" y="0" width="60" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- LEFT backrest strip (forms L with top) -->
    <rect x="0" y="0" width="11" height="60" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- L-corner accent: darker square where the two backrests meet -->
    <rect x="0" y="0" width="11" height="11" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- Open-side markers (dashed) — the right + bottom edges are open
         for connecting to perpendicular sofa segments -->
    <line x1="60" y1="13" x2="60" y2="60" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="13" y1="60" x2="60" y2="60" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="2,2"/>
    <!-- "CORNER" label -->
    <text x="36" y="40" font-family="sans-serif" font-size="5" fill="#8C7956" text-anchor="middle" font-weight="700" letter-spacing="0.5">CORNER</text>
  </g>
</svg>
