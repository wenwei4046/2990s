<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 110" width="100" height="110">
  <title>2990s Sofa Module — 1A-LHF — 1 Seater, Left Hand Facing</title>
