<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 110" width="160" height="110">
  <title>2990s Sofa Module — 2B-LHF — Bench (chaise) on LEFT, regular arm on RIGHT (2 seats)</title>
  <desc>Top-down plan view. 2 seats + LEFT side bench/chaise (full height, no backrest above) + RIGHT side regular armrest. Dashed seam between the 2 seat cushions (NOT extending into the bench area).</desc>
  <g transform="translate(20,20)">
    <!-- Body outline (cream) -->
    <rect x="0" y="0" width="120" height="70" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <!-- Backrest covers ONLY the 2-seat portion (right side) — bench area has no backrest above -->
    <rect x="22" y="0" width="98" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- LEFT bench/chaise cushion — wide soft pillow, full body height -->
    <rect x="2" y="2" width="20" height="66" rx="5" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- RIGHT armrest — tall narrow dark tan -->
    <rect x="108" y="0" width="12" height="70" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- Seat-to-seat dashed divider (only in the 2-seat portion, between the 2 seats) -->
    <line x1="71" y1="11" x2="71" y2="70" stroke="#2C2C2A" stroke-width="0.5" stroke-dasharray="2,2"/>
  </g>
</svg>
