<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 132" width="100" height="132">
  <title>2990s Sofa Module — 1R-OPEN — 1-Seater Recliner (open / footrest extended)</title>
  <desc>Top-down plan view. Single recliner seat in OPEN position: body with backrest and armrests on both sides; footrest extends forward (south) in front of the seat.</desc>
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="60" height="70" rx="3" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
    <rect x="0" y="0" width="60" height="11" fill="#D9C2A0" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- LEFT armrest -->
    <rect x="0" y="0" width="11" height="70" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- RIGHT armrest -->
    <rect x="49" y="0" width="11" height="70" fill="#B89972" stroke="#2C2C2A" stroke-width="0.8"/>
    <!-- Footrest extension: narrower than seat, sits forward of the seat (south) -->
    <rect x="11" y="70" width="38" height="22" rx="2" fill="#F0E6D6" stroke="#2C2C2A" stroke-width="1.4"/>
  </g>
</svg>
