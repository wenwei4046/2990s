name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build POS + Backend
        run: pnpm exec turbo run build --filter=@2990s/pos --filter=@2990s/backend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Auto-applies packages/db/migrations/*.sql numbered >= 0168 (plus the
      # explicit backfill list inside the script) before anything ships.
      # If the SUPABASE_DB_URL secret is not configured the script prints a
      # notice and exits 0, so the deploy still proceeds.
      - name: Apply DB migrations
        run: node scripts/db-migrate.mjs
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy API to Workers
        working-directory: apps/api
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy POS to Pages
        working-directory: apps/api
        # --commit-message=<sha>: wrangler otherwise derives it from the git HEAD
        # message, and Cloudflare's Pages deployment API rejects non-ASCII commit
        # messages (em-dash / emoji) with "Invalid commit message ... [8000111]".
        # The commit SHA is always valid ASCII, so this can never break a deploy.
        run: pnpm exec wrangler pages deploy ../pos/dist --project-name=2990s-pos --branch=main --commit-dirty=true --commit-message="${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Backend to Pages
        working-directory: apps/api
        run: pnpm exec wrangler pages deploy ../backend/dist --project-name=2990s-backend --branch=main --commit-dirty=true --commit-message="${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
