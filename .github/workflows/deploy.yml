name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build POS + Backend
        run: pnpm exec turbo run build --filter=@2990s/pos --filter=@2990s/backend
        env:
          # POS-side cutover flip (2026-07-21): the POS now builds pointing at
          # Houzs ERP for company_2. apiClient.ts reads VITE_BACKEND_TARGET and
          # switches to houzsApiRoot() when set to 'houzs'. Absent = 2990.
          # These are inlined into the client bundle at build time (Vite).
          # Rollback: remove these three lines and redeploy — POS reverts to 2990.
          VITE_BACKEND_TARGET: houzs
          VITE_HOUZS_API_URL: https://erp.houzscentury.com/api/scm
          VITE_HOUZS_COMPANY_ID: '2'
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # Auto-applies packages/db/migrations/*.sql numbered >= 0168 (plus the
      # explicit backfill list inside the script) before anything ships.
      # If the SUPABASE_DB_URL secret is not configured the script prints a
      # notice and exits 0, so the deploy still proceeds.
      - name: Apply DB migrations
        # Non-blocking: in practice migrations are applied via the Supabase MCP,
        # and this step has been failing (DB secret unset/unreachable) which
        # SKIPPED every deploy step below — so nothing actually shipped. Letting
        # it continue-on-error means the deploy proceeds; a genuine migration
        # failure still shows red in this step's log for follow-up.
        continue-on-error: true
        run: node scripts/db-migrate.mjs
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Deploy API to Workers
        working-directory: apps/api
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy POS to Pages
        working-directory: apps/api
        # --commit-message=<sha>: wrangler otherwise derives it from the git HEAD
        # message, and Cloudflare's Pages deployment API rejects non-ASCII commit
        # messages (em-dash / emoji) with "Invalid commit message ... [8000111]".
        # The commit SHA is always valid ASCII, so this can never break a deploy.
        run: pnpm exec wrangler pages deploy ../pos/dist --project-name=2990s-pos --branch=main --commit-dirty=true --commit-message="${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Backend to Pages
        working-directory: apps/api
        run: pnpm exec wrangler pages deploy ../backend/dist --project-name=2990s-backend --branch=main --commit-dirty=true --commit-message="${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
